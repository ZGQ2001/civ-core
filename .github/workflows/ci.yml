# .github/workflows/ci.yml
name: CI 流水线

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# 给 auto-fix commit 用的写权限
permissions:
  contents: write

jobs:
  python:
    name: Python / Windows
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: 还原 Python 依赖
        run: uv sync --dev

      - name: Ruff 自动格式化
        run: uv run ruff format .

      - name: Ruff 代码规范
        run: uv run ruff check .

      - name: Python 单元测试
        run: uv run pytest

      - name: 项目健康检查
        run: uv run python scripts/healthcheck.py

  csharp:
    name: C# / Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: C# 格式检查
        run: dotnet format style --verify-no-changes
        working-directory: dotnet/civ-doc

      - name: C# 编译
        run: dotnet build
        working-directory: dotnet/civ-doc

      - name: C# 单元测试
        run: dotnet test
        working-directory: dotnet/civ-doc

  frontend:
    name: 前端 (TS) / Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 安装前端依赖
        run: npm ci
        working-directory: frontend

      - name: Prettier 自动格式化
        run: npm run format
        working-directory: frontend

      - name: ESLint 代码规范
        run: npm run lint
        working-directory: frontend

      - name: TypeScript 类型检查
        run: npx tsc -b --noEmit
        working-directory: frontend

  rust:
    name: Rust (Tauri) / Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 缓存 cargo 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Rust 格式检查
        run: cargo fmt --check
        working-directory: frontend/src-tauri

      - name: Rust Clippy 规范
        run: cargo clippy -- -D warnings
        working-directory: frontend/src-tauri

      - name: Rust 编译检查
        run: cargo check --lib
        working-directory: frontend/src-tauri

  # 把格式化结果 push 回去（仅当非 auto-fix commit 时）
  auto-commit:
    name: 提交格式修复
    runs-on: ubuntu-latest
    needs: [python, frontend]
    if: ${{ !contains(github.event.head_commit.message, '[ci auto-fix]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CI_PAT }}

      - name: 安装 ruff
        uses: astral-sh/setup-uv@v5

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装前端依赖
        run: npm ci
        working-directory: frontend

      - name: 自动格式化
        run: |
          pip install ruff
          ruff format .
          cd frontend && npm run format

      - name: 提交修复
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "style: auto-fix formatting [ci auto-fix]"
            git push
          fi
