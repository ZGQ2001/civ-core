# .github/workflows/ci.yml
name: CI 流水线

# 触发条件：推送到 main 或提交 PR 时，自动检查代码能不能跑。
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality-gate:
    name: 代码质检 / Windows
    # civ-core 是 Windows 桌面工具：pywin32、QSettings、Qt 行为都必须优先在 Windows 上验。
    runs-on: windows-latest

    env:
      # 让 PySide6 在无真实显示器的 CI 环境里也能创建 QApplication。
      QT_QPA_PLATFORM: offscreen
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: 还原依赖
        run: uv sync --dev

      - name: 检查格式和代码规范
        run: |
          uv run ruff format --check .
          uv run ruff check .

      - name: 运行单元测试
        run: uv run pytest

      - name: 运行项目健康检查
        run: uv run python scripts/healthcheck.py
