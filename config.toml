# ════════════════════════════════════════════════════════════════════
#  筑核 (civ-core) — 用户可调配置
#  改完不需要重启 IDE，只需要重启程序即可生效。
#  路径如无特殊说明，均为「相对项目根」。
# ════════════════════════════════════════════════════════════════════

[app]
name = "筑核"
version = "0.2.3-dev"

# ── 路径 ─────────────────────────────────────────────────────────
[paths]
templates = "./templates"                                       # 报告模板中心（docx / xlsx，与预设系统无关）
curve_presets = "./presets/plot_curves/curve_presets.json"      # 绘曲线图系统预设库
data_raw = "./data/raw"                                         # 原始输入文件
data_output = "./data/output"                                   # 程序产出
logs = "./logs"                                                 # 应用日志
# DEPRECATED：00–05 旧目录将整体删除。此条仅给尚未迁移的工具
# （body_format / table_format 读 report_style_config.json）继续兼容。
# 这两个工具迁移到 src/ 后，本字段一并移除。
legacy_config_dir = "./04_Config"

# ── UI ───────────────────────────────────────────────────────────
[ui]
theme = "dark"                      # auto | light | dark
language = "zh_CN"
accent_color = "#0078D4"
startup_size = [1320, 840]
sidebar_width = 280

# ── 日志 ─────────────────────────────────────────────────────────
[logging]
level = "INFO"                      # 全局最低级别
console_level = "INFO"
file_level = "DEBUG"
max_file_mb = 10
backup_count = 5

# ── 批量队列 ─────────────────────────────────────────────────────
[batch_queue]
max_concurrent = 1                  # Word COM 串行运行避免争抢
retry_on_fail = false
pause_on_error = true

# ── Word / WPS 自动化 ────────────────────────────────────────────
[word]
kill_residual_on_start = true       # 启动时清理僵尸 WINWORD.EXE
unblock_files = true                # 自动解除「来自互联网」标记
backup_before_format = true         # 排版前自动备份当前文档

# ── 业务阈值 ─────────────────────────────────────────────────────
[thresholds]
max_undo_steps = 50                 # QUndoStack 最多保留多少步
log_panel_lines = 5000              # 日志面板最大保留行数

# ── 开发模式 ─────────────────────────────────────────────────────
# enabled=true：用户预设写入下面 user_presets_dir（默认 tests/fixtures/presets/，进 git）
# enabled=false：用户预设写入 ~/.civ-core/presets/（不进 git，最终用户场景）
# 普通用户保持 false；只有写测试 / 调试预设系统时才打开。
[dev]
enabled = false
user_presets_dir = "tests/fixtures/presets"

# ── 项目管理 ─────────────────────────────────────────────────────
[projects]
db_path = "~/.civ-core/projects.db"                               # 项目数据库位置
default_root_dir = ""                                             # 新建项目默认文件夹根目录（空=每次询问）
