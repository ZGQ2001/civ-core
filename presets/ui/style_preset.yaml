# civ-core 全局 UI 样式预设（系统默认）
#
# 用法：
#   • 此文件为系统默认值，受 git 管理，运行时只读
#   • 用户可在 ~/.civ-core/presets/ui/style_preset.yaml 覆盖部分字段
#   • 任何字段缺失都会回退到 src/civ_core/domain/style_schema.py 的 dataclass 默认值
#   • 修改后需重启程序（或调 reload_style_preset() 清缓存）

typography:
  # UI 字体优先 Segoe UI（Windows 系统默认 + VSCode 默认），中文回退 Microsoft YaHei UI
  font_family_ui: "'Segoe UI', 'Microsoft YaHei UI', 'Microsoft YaHei', sans-serif"
  # 等宽字体：VSCode 默认 Cascadia Mono，回退 JetBrains Mono / Consolas
  font_family_mono: "'Cascadia Mono', 'JetBrains Mono', 'Consolas', monospace"
  # 字号阶梯（VSCode 紧凑风）：body=10pt(≈13px) = VSCode 默认 UI 字号
  # 之前 body=14 偏大，整体视觉过家家；改 10 + 紧凑 padding 让界面专业
  size_title: 14
  size_subtitle: 11
  size_body: 10
  size_caption: 9
  size_small: 8

colors:
  # 主色 / 强调
  primary: "#1976D2"
  primary_hover: "#1565C0"
  danger: "#E53935"
  danger_hover: "#C62828"
  # 文字色
  text_primary: "#212121"
  text_secondary: "#757575"
  text_tertiary: "#9E9E9E"
  # 描边 / 背景
  border: "#E0E0E0"
  bg: "#FFFFFF"
  bg_alt: "#F8F9FA"
  bg_header: "#F0F0F0"
  bg_drawer: "#FAFAFA"
  bg_hover: "#F5F8FF"
  # 项目状态色
  status_pending: "#9E9E9E"    # ○ 未开始
  status_active: "#1976D2"     # ● 进行中
  status_done: "#43A047"       # ✓ 已完成
  status_on_hold: "#FB8C00"    # ⏸ 暂存
  status_archived: "#616161"   # ▣ 已归档

dimensions:
  radius: 4
  spacing_sm: 4
  spacing_md: 8
  spacing_lg: 12
  spacing_xl: 16
  button_height: 30
  header_height: 32
